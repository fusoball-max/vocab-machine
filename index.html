<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ink Vocab 智慧單字機</title>
    <!-- 引入 PWA 資訊 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <!-- iOS 支援 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        /* --- 1. E-Ink 風格基本設定 --- */
        :root {
            --bg-color: #f7f5f0;     /* 偏暖的電子紙底色 */
            --text-main: #1a1a1a;    /* 墨黑色文字 */
            --text-sub: #666666;     /* 灰色細節 */
            --border-color: #2b2b2b; /* 邊框色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* 主容器 */
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        /* 頂部全域工具列 */
        .global-util-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin-bottom: -10px;
        }

        .util-btn {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--border-color);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .util-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px var(--border-color);
        }

        /* --- 2. 視窗 A：主選單（單字庫與關卡選擇） --- */
        .menu-title {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .book-section {
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background-color: var(--bg-color);
            margin-bottom: 15px;
            box-shadow: 3px 3px 0px var(--border-color);
            overflow: hidden;
        }

        /* --- 儀表板與複習區塊 --- */
        .dashboard {
            background-color: var(--border-color);
            color: var(--bg-color);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }
        .dashboard-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .dashboard-stats div {
            flex: 1;
            padding: 0 4px;
        }
        .dashboard-stats strong {
            font-size: 20px;
            display: block;
            margin-top: 4px;
        }
        .review-btn {
            background: var(--bg-color);
            color: var(--text-main);
            border: 2px solid var(--bg-color);
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .review-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px rgba(0,0,0,0.5);
        }
        .review-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .book-header {
            background-color: var(--border-color);
            color: var(--bg-color);
            padding: 12px 16px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stage-list {
            display: flex;
            flex-direction: column;
        }

        .stage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .stage-item:last-child {
            border-bottom: none;
        }
        .stage-item:active {
            background-color: #eae7e0;
        }

        .stage-name {
            font-weight: bold;
            font-size: 14px;
        }

        .stage-progress {
            font-size: 12px;
            color: var(--text-sub);
            font-weight: bold;
        }

        /* --- 3. 視窗 B：學習卡片畫面 --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
        }

        .back-btn {
            background: none;
            border: 2px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .back-btn:active {
            background-color: var(--border-color);
            color: var(--bg-color);
        }

        /* 3D 卡片翻轉效果 */
        .card-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 280px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 3px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            box-shadow: 4px 4px 0px var(--border-color);
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .word {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-align: center;
        }

        .phonetic {
            font-size: 16px;
            color: var(--text-sub);
            margin-bottom: 24px;
        }

        .audio-btn {
            background: none;
            border: 2px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .audio-btn:active {
            background-color: var(--border-color);
            color: var(--bg-color);
        }

        .translation {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 16px;
            text-align: center;
        }

        .example-box {
            text-align: center;
            border-top: 1px dashed var(--border-color);
            padding-top: 16px;
            width: 100%;
        }

        .example-en {
            font-size: 14px;
            font-style: italic;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .example-zh {
            font-size: 13px;
            color: var(--text-sub);
        }

        .tip {
            position: absolute;
            bottom: 12px;
            font-size: 11px;
            color: var(--text-sub);
            letter-spacing: 1px;
        }

        /* --- 9. E-Ink 刷屏閃爍特效 --- */
        .eink-refresh-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--text-main);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
        }
        .eink-refresh-overlay.flash {
            animation: eink-flash-anim 0.15s ease-in-out;
        }
        @keyframes eink-flash-anim {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 底部反饋按鈕 */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .btn-group.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .btn {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            padding: 12px 0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--border-color);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--border-color);
        }

        .btn-forget { color: #888; }
        .btn-master { background-color: var(--border-color); color: var(--bg-color); }
    </style>
</head>
<body>

    <!-- 刷屏閃爍覆蓋層 -->
    <div id="eink-flash-overlay" class="eink-refresh-overlay"></div>

    <!-- 全域工具列（主選單專用：重置與隨機配置） -->
    <div class="global-util-bar" id="global-util-bar">
        <button class="util-btn" onclick="toggleShuffle()" id="shuffle-toggle-btn">🔀 隨機排序：關</button>
        <button class="util-btn" style="background-color: #fee; border-color: #822; color: #822;" onclick="resetAllProgress()">🗑️ 清除所有進度</button>
    </div>

    <div class="container">
        
        <!-- ================= 視窗 A：主選單 ================= -->
        <div id="view-menu">
            <h1 class="menu-title">🎒 智慧單字庫</h1>
            
            <!-- 學習儀表板 -->
            <div class="dashboard" id="learning-dashboard">
                <div class="dashboard-stats">
                    <div>總學習<strong id="dash-total-learned">0</strong></div>
                    <div>已掌握<strong id="dash-total-mastered">0</strong></div>
                    <div>待加強<strong id="dash-total-learning">0</strong></div>
                </div>
                <button class="review-btn" id="start-review-btn" onclick="startReview()">🧠 開始隨機抽背</button>
            </div>

            <div id="books-container">
                <!-- 由 JavaScript 動態生成單字庫列表 -->
            </div>
        </div>

        <!-- ================= 視窗 B：學習卡片 ================= -->
        <div id="view-learn" class="hidden">
            <!-- 頂部列 -->
            <div class="header">
                <button class="back-btn" onclick="backToMenu()">⬅ 返回選單</button>
                <div>
                    <span id="current-book-tag" style="color: var(--text-sub); font-size: 12px; display: block; text-align: right;"></span>
                    <span id="stage-title">STAGE 1</span>
                    <span id="progress-text">0 / 0</span>
                </div>
            </div>

            <!-- 3D 卡片 -->
            <div class="card-wrapper" onclick="flipCard()">
                <div class="card" id="vocab-card">
                    <!-- 正面 -->
                    <div class="card-face card-front">
                        <div class="word" id="card-word">Loading...</div>
                        <div class="phonetic" id="card-phonetic">[/.../]</div>
                        <button class="audio-btn" onclick="speak(event)">
                            🔊 <span>發音</span>
                        </button>
                        <div class="tip">點擊卡片翻面</div>
                    </div>
                    <!-- 背面 -->
                    <div class="card-face card-back">
                        <div class="translation" id="card-translation">載入中...</div>
                        <div class="example-box">
                            <div class="example-en" id="card-example-en">Example...</div>
                            <div class="example-zh" id="card-example-zh">例句...</div>
                        </div>
                        <div class="tip">點擊卡片返回正面</div>
                    </div>
                </div>
            </div>

            <!-- 底部按鈕 -->
            <div class="btn-group" id="btn-group">
                <button class="btn btn-forget" onclick="handleResponse('forget')">🔴 忘記</button>
                <button class="btn" onclick="handleResponse('unsure')">🟡 模糊</button>
                <button class="btn btn-master" onclick="handleResponse('master')">🟢 熟記</button>
            </div>
        </div>

    </div>

    <script>
        // --- 3. 四大核心單字庫 (小學、初中、高中、大學) ---
        // 💡 提示：您隨時可以依照下方格式，增加更多 Stage，或在現有 Stage 內貼入更多單字。
        // 資料已抽離至獨立的 javascript 檔案
    </script>
    <script src="vocab-data.js"></script>
    <script>

        // --- 4. 狀態管理 ---
        let currentBookKey = "";
        let currentStageNum = 1;
        let currentWords = [];
        let currentIndex = 0;
        let userProgress = {}; // 格式為 { "word_id": { status: 'mastered' } }
        let isShuffleEnabled = false; // 是否開啟隨機打亂單字

        // 註冊 Service Worker (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Service Worker 註冊成功！範圍:', reg.scope))
                    .catch(err => console.log('Service Worker 註冊失敗:', err));
            });
        }

        // --- 5. 初始化與選單載入 ---
        window.onload = function() {
            // 從 LocalStorage 載入進度
            const savedProgress = localStorage.getItem('eink_vocab_progress');
            if (savedProgress) {
                userProgress = JSON.parse(savedProgress);
            }

            // 載入隨機排序偏好
            const savedShuffle = localStorage.getItem('eink_vocab_shuffle');
            if (savedShuffle) {
                isShuffleEnabled = savedShuffle === 'true';
                updateShuffleButtonUI();
            }

            renderMenu();
        };

        // 切換隨機排序
        function toggleShuffle() {
            isShuffleEnabled = !isShuffleEnabled;
            localStorage.setItem('eink_vocab_shuffle', isShuffleEnabled);
            updateShuffleButtonUI();
        }

        function updateShuffleButtonUI() {
            const btn = document.getElementById('shuffle-toggle-btn');
            if (isShuffleEnabled) {
                btn.innerText = '🔀 隨機排序：開';
                btn.style.backgroundColor = '#e8f0fe';
                btn.style.borderColor = '#3b82f6';
            } else {
                btn.innerText = '🔀 隨機排序：關';
                btn.style.backgroundColor = 'var(--bg-color)';
                btn.style.borderColor = 'var(--border-color)';
            }
        }

        // 清除所有學習進度
        function resetAllProgress() {
            const confirmReset = confirm('⚠️ 確定要清除所有的學習進度嗎？清除後將無法復原。');
            if (confirmReset) {
                userProgress = {};
                localStorage.removeItem('eink_vocab_progress');
                renderMenu();
                alert('✨ 學習進度已成功清除！');
            }
        }

        // Fisher-Yates 隨機打亂算法
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 生成主選單
        function renderMenu() {
            const container = document.getElementById('books-container');
            container.innerHTML = ""; // 清空

            let totalLearned = 0;
            let totalMastered = 0;
            let totalLearning = 0;

            for (let bookKey in vocabDatabase) {
                const book = vocabDatabase[bookKey];
                
                // 建立一個單字庫區塊
                const bookSection = document.createElement('div');
                bookSection.className = 'book-section';

                // 標題
                const bookHeader = document.createElement('div');
                bookHeader.className = 'book-header';
                bookHeader.innerHTML = `<span>${book.name}</span>`;
                bookSection.appendChild(bookHeader);

                // 關卡清單
                const stageList = document.createElement('div');
                stageList.className = 'stage-list';

                for (let stageNum in book.stages) {
                    const wordsInStage = book.stages[stageNum];
                    
                    // 計算此關卡進度
                    let masteredCount = 0;
                    wordsInStage.forEach(word => {
                        if (userProgress[word.id]) {
                            totalLearned++;
                            if (userProgress[word.id].status === 'mastered') {
                                masteredCount++;
                                totalMastered++;
                            } else if (userProgress[word.id].status === 'learning') {
                                totalLearning++;
                            }
                        }
                    });
                    const percent = Math.round((masteredCount / wordsInStage.length) * 100);

                    const stageItem = document.createElement('div');
                    stageItem.className = 'stage-item';
                    stageItem.onclick = () => startLearning(bookKey, parseInt(stageNum));
                    stageItem.innerHTML = `
                        <span class="stage-name">STAGE ${stageNum}</span>
                        <span class="stage-progress">${masteredCount} / ${wordsInStage.length} 已掌握 (${percent}%)</span>
                    `;
                    stageList.appendChild(stageItem);
                }

                bookSection.appendChild(stageList);
                container.appendChild(bookSection);
            }

            // 更新儀表板數據
            document.getElementById('dash-total-learned').innerText = totalLearned;
            document.getElementById('dash-total-mastered').innerText = totalMastered;
            document.getElementById('dash-total-learning').innerText = totalLearning;
            
            const reviewBtn = document.getElementById('start-review-btn');
            if (totalLearned === 0) {
                reviewBtn.disabled = true;
                reviewBtn.innerText = "🧠 尚未有學習紀錄";
            } else {
                reviewBtn.disabled = false;
                reviewBtn.innerText = "🧠 開始隨機抽背";
            }
        }

        // --- 刷屏特效控制 ---
        function triggerEInkRefresh(callback) {
            const overlay = document.getElementById('eink-flash-overlay');
            overlay.classList.add('flash');
            
            // 螢幕全黑的瞬間 (大約 75ms) 執行畫面與資料替換
            setTimeout(() => {
                if (callback) callback();
            }, 75);

            // 動畫結束後移除動畫類別，方便下次重新觸發
            setTimeout(() => {
                overlay.classList.remove('flash');
            }, 150);
        }

        // --- 6. 視窗控制：進入學習狀態 (含複習) ---
        function startReview() {
            // 收集所有學過的字
            let reviewWords = [];
            for (let bookKey in vocabDatabase) {
                const book = vocabDatabase[bookKey];
                for (let stageNum in book.stages) {
                    book.stages[stageNum].forEach(word => {
                        if (userProgress[word.id]) {
                            reviewWords.push(word);
                        }
                    });
                }
            }

            if (reviewWords.length === 0) return;

            triggerEInkRefresh(() => {
                currentBookKey = 'review';
                currentStageNum = 'all';
                
                // 每次抽背都隨機排序
                currentWords = shuffleArray(reviewWords);
                currentIndex = 0;

                document.getElementById('global-util-bar').classList.add('hidden');
                document.getElementById('view-menu').classList.add('hidden');
                document.getElementById('view-learn').classList.remove('hidden');

                document.getElementById('current-book-tag').innerText = '總複習模式';
                document.getElementById('stage-title').innerText = `隨機抽背`;

                renderCard();
            });
        }

        function startLearning(bookKey, stageNum) {
            triggerEInkRefresh(() => {
                currentBookKey = bookKey;
                currentStageNum = stageNum;
                
                let originalWords = vocabDatabase[bookKey].stages[stageNum];
                if (isShuffleEnabled) {
                    currentWords = shuffleArray(originalWords);
                } else {
                    currentWords = originalWords;
                }
                currentIndex = 0;

                // 切換畫面時隱藏工具列，進入安靜背書模式
                document.getElementById('global-util-bar').classList.add('hidden');
                document.getElementById('view-menu').classList.add('hidden');
                document.getElementById('view-learn').classList.remove('hidden');

                // 標示單字庫與關卡名稱
                document.getElementById('current-book-tag').innerText = vocabDatabase[bookKey].name;
                document.getElementById('stage-title').innerText = `STAGE ${stageNum}`;

                renderCard();
            });
        }

        // 返回選單畫面
        function backToMenu() {
            triggerEInkRefresh(() => {
                document.getElementById('global-util-bar').classList.remove('hidden');
                document.getElementById('view-learn').classList.add('hidden');
                document.getElementById('view-menu').classList.remove('hidden');

                if (window.currentAudio) {
                    window.currentAudio.pause();
                }

                renderMenu();
            });
        }

        // --- 7. 卡片繪製與翻牌控制 ---
        function renderCard() {
            if (currentWords.length === 0) return;
            const currentWord = currentWords[currentIndex];

            // 每次載入新字，重置卡片狀態
            const cardElement = document.getElementById('vocab-card');
            cardElement.classList.remove('flipped');
            document.getElementById('btn-group').classList.remove('visible');

            // 塞入單字資訊
            document.getElementById('card-word').innerText = currentWord.word;
            document.getElementById('card-phonetic').innerText = currentWord.phonetic;
            document.getElementById('card-translation').innerText = currentWord.translation;
            document.getElementById('card-example-en').innerText = currentWord.example_en;
            document.getElementById('card-example-zh').innerText = currentWord.example_zh;

            // 進度更新
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${currentWords.length}`;
        }

        function flipCard() {
            const card = document.getElementById('vocab-card');
            card.classList.toggle('flipped');

            const btnGroup = document.getElementById('btn-group');
            if (card.classList.contains('flipped')) {
                btnGroup.classList.add('visible');
            } else {
                btnGroup.classList.remove('visible');
            }
        }

        // 真人發音引擎（有道美音）
        function speak(event) {
            if (event) event.stopPropagation(); // 阻止觸發翻轉卡片
            const wordText = currentWords[currentIndex].word;
            speakImmediate(wordText);
        }

        function speakImmediate(text) {
            if (window.currentAudio) {
                window.currentAudio.pause();
                window.currentAudio.currentTime = 0;
            }

            const audioUrl = `https://dict.youdao.com/dictvoice?type=2&audio=${encodeURIComponent(text)}`;
            window.currentAudio = new Audio(audioUrl);
            window.currentAudio.play().catch(err => {
                console.warn("發音播放失敗：請先在頁面上與按鈕進行互動。", err);
            });
        }

        // --- 8. 儲存進度與關卡推進邏輯 ---
        function handleResponse(responseType) {
            const currentWord = currentWords[currentIndex];
            
            if (!userProgress[currentWord.id]) {
                userProgress[currentWord.id] = { status: 'new' };
            }

            if (responseType === 'master') {
                userProgress[currentWord.id].status = 'mastered';
            } else {
                userProgress[currentWord.id].status = 'learning';
            }

            localStorage.setItem('eink_vocab_progress', JSON.stringify(userProgress));

            // 切換下一張卡片時觸發 E-ink 刷屏特效
            setTimeout(() => {
                triggerEInkRefresh(() => {
                    nextCard();
                });
            }, 50);
        }

        function nextCard() {
            if (currentIndex < currentWords.length - 1) {
                currentIndex++;
                renderCard();
            } else {
                if (currentBookKey === 'review') {
                    alert(`🎉 恭喜！你已完成這次的隨機抽背！`);
                    backToMenu();
                    return;
                }

                alert(`🎉 恭喜！你已完成這個階段的背誦！`);
                
                const totalStages = Object.keys(vocabDatabase[currentBookKey].stages).length;
                if (currentStageNum < totalStages) {
                    const confirmNext = confirm(`是否要前往下一個關卡 STAGE ${currentStageNum + 1}？`);
                    if (confirmNext) {
                        startLearning(currentBookKey, currentStageNum + 1);
                    } else {
                        backToMenu();
                    }
                } else {
                    alert(`🏆 太厲害了！你已將這本書的所有關卡挑戰完畢！`);
                    backToMenu();
                }
            }
        }
    </script>
</body>
</html>
